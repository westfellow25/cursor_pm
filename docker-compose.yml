version: "3.9"

services:
  pulse:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./pulse.db
      - SECRET_KEY=${SECRET_KEY:-change-me-to-random-string}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOG_LEVEL=info
    volumes:
      - pulse-data:/app
    restart: unless-stopped

volumes:
  pulse-data:
